###############################################################################
# Phase 6B · docker-compose.yml
# Local Dev Stack: FastAPI + PostgreSQL + Qdrant + Neo4j + Redis
###############################################################################
version: "3.9"

services:
  # ── API Server ────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: qa-agent-api
    ports:
      - "8000:8000"
    env_file: ../.env
    environment:
      DATABASE_URL: "postgresql+asyncpg://qa:dev_password@postgres:5432/qa_agent"
      QDRANT_URL: "http://qdrant:6333"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "dev_password"
      REDIS_URL: "redis://redis:6379/0"
      ENVIRONMENT: "local"
      LOG_LEVEL: "DEBUG"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ../src:/app/src:ro
      - ../config:/app/config:ro
      - artifacts:/app/artifacts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Agent Worker (background task runner) ─────────────────────
  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: qa-agent-worker
    command: ["python", "-m", "src.api.worker"]
    env_file: ../.env
    environment:
      DATABASE_URL: "postgresql+asyncpg://qa:dev_password@postgres:5432/qa_agent"
      QDRANT_URL: "http://qdrant:6333"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "dev_password"
      REDIS_URL: "redis://redis:6379/0"
      WORKER_CONCURRENCY: "4"
    depends_on:
      - api
    volumes:
      - ../src:/app/src:ro
      - ../config:/app/config:ro
      - artifacts:/app/artifacts
    restart: unless-stopped

  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: qa-agent-postgres
    environment:
      POSTGRES_DB: qa_agent
      POSTGRES_USER: qa
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qa -d qa_agent"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Qdrant (Vector DB) ───────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: qa-agent-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped

  # ── Neo4j (Graph DB) ─────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: qa-agent-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/dev_password"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: "512M"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

  # ── Redis (Cache + Queue) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: qa-agent-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pg_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  artifacts:
