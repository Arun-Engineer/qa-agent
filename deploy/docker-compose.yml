# ═══════════════════════════════════════════════════
#  AI QA Platform — Docker Compose
#  Run: docker compose up -d
# ═══════════════════════════════════════════════════

services:
  qa-agent:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: qa-agent
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite database + reports across container restarts
      - qa-data:/app/data
      - qa-logs:/app/logs
      - qa-reports:/app/reports
    env_file:
      - ../.env
    environment:
      - APP_ENV=production
      - DATABASE_URL=sqlite:///./data/app.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Nginx reverse proxy (SSL termination + static caching)
  nginx:
    image: nginx:alpine
    container_name: qa-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - qa-agent

  # Auto-renew SSL certs (Let's Encrypt)
  certbot:
    image: certbot/certbot
    container_name: qa-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  qa-data:
  qa-logs:
  qa-reports:
