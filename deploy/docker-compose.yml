# deploy/docker-compose.yml — Local development environment
# Usage: docker-compose -f deploy/docker-compose.yml up

version: "3.8"

services:
  # ─── AI QA Platform ───
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - DATABASE_URL=sqlite:///./data/app.db
      - SESSION_SECRET=dev-secret-change-in-prod
      - DEFAULT_TENANT=local
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-4o-mini
      - RAG_ENABLED=1
      - CHROMA_DIR=data/chroma
      - ARTIFACTS_DIR=data/logs
      - QA_MAX_RETRIES=3
      - QA_STEP_TIMEOUT=120
    volumes:
      # Mount source for hot reload
      - ..:/app
      # Persist data between restarts
      - app-data:/app/data
    command: ["python", "-m", "uvicorn", "asgi:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  app-data:
