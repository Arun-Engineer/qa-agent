# ═══════════════════════════════════════════════════
#  Nginx — Reverse Proxy for AI QA Platform
#  Handles: SSL, static caching, WebSocket, security headers
# ═══════════════════════════════════════════════════

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# Redirect HTTP → HTTPS (uncomment after SSL is set up)
# server {
#     listen 80;
#     server_name your-domain.com;
#     location /.well-known/acme-challenge/ { root /var/www/certbot; }
#     location / { return 301 https://$host$request_uri; }
# }

server {
    listen 80;
    # listen 443 ssl;  # Uncomment after SSL setup
    server_name _;

    # SSL (uncomment after certbot setup)
    # ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Static files (cached by nginx, not hitting the app)
    location /static/ {
        proxy_pass http://qa-agent:8000/static/;
        proxy_cache_valid 200 1h;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # API and app — proxy to gunicorn
    location / {
        proxy_pass http://qa-agent:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for future real-time features)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for long-running LLM calls
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;

        # Rate limiting on API routes
        limit_req zone=api burst=50 nodelay;
    }

    # Block sensitive paths
    location ~ /\. { deny all; }
    location = /.env { deny all; }
    location = /data/app.db { deny all; }

    # Health check (no rate limit)
    location = /health {
        proxy_pass http://qa-agent:8000/health;
        limit_req off;
    }

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
