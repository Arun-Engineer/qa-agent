apiVersion: v1
kind: Namespace
metadata:
  name: qa-agent
  labels:
    app.kubernetes.io/name: qa-agent
    app.kubernetes.io/part-of: qa-agent-platform
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: qa-agent-config
  namespace: qa-agent
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  QDRANT_URL: "http://qdrant-service:6333"
  NEO4J_URI: "bolt://neo4j-service:7687"
  REDIS_URL: "redis://redis-service:6379/0"
  WORKER_CONCURRENCY: "8"
  MAX_PARALLEL_BROWSERS: "20"
  MAX_TESTS_PER_RUN: "500"
---
apiVersion: v1
kind: Secret
metadata:
  name: qa-agent-secrets
  namespace: qa-agent
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://qa:CHANGE_ME@postgres-service:5432/qa_agent"
  NEO4J_USER: "neo4j"
  NEO4J_PASSWORD: "CHANGE_ME"
  ANTHROPIC_API_KEY: "CHANGE_ME"
  SLACK_BOT_TOKEN: "CHANGE_ME"
  ADO_PAT: "CHANGE_ME"
