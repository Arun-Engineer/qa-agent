apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qa-agent-ingress
  namespace: qa-agent
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - qa-agent.example.com
      secretName: qa-agent-tls
  rules:
    - host: qa-agent.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: qa-agent-api-service
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qa-agent-api-service
                port:
                  number: 80
