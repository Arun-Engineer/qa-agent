apiVersion: apps/v1
kind: Deployment
metadata:
  name: qa-agent-api
  namespace: qa-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qa-agent-api
  template:
    metadata:
      labels:
        app: qa-agent-api
    spec:
      containers:
        - name: api
          image: qa-agent:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: qa-agent-config
            - secretRef:
                name: qa-agent-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: qa-agent-api-service
  namespace: qa-agent
spec:
  selector:
    app: qa-agent-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: qa-agent-api-hpa
  namespace: qa-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: qa-agent-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
