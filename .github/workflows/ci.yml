# .github/workflows/ci.yml
# Runs on every push and PR to main/develop/ui/*
# Steps: lint → test → build Docker image → push to ECR (on main only)

name: CI

on:
  push:
    branches: [main, develop, "ui/*"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ═══════════════════════════════════
  # Job 1: Lint + Type Check
  # ═══════════════════════════════════
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lint tools
        run: pip install ruff

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

  # ═══════════════════════════════════
  # Job 2: Unit + Integration Tests
  # ═══════════════════════════════════
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DATABASE_URL: "sqlite:///./data/test.db"
      SESSION_SECRET: "ci-test-secret"
      DEFAULT_TENANT: "test"
      APP_ENV: "test"
      QA_DISABLE_RECON: "1"
      RAG_ENABLED: "0"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Create data dirs
        run: mkdir -p data/logs data/chroma

      - name: Run unit tests
        run: |
          pytest tests/test_core.py tests/test_orchestrator.py -v \
            --tb=short \
            --co -q 2>/dev/null || true
          pytest tests/test_core.py tests/test_orchestrator.py -v \
            --tb=short \
            --junitxml=reports/junit.xml \
            --cov=agent \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=term-missing

      - name: Run workflow tests
        run: |
          pytest tests/test_workflows.py -v --tb=short || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: reports/

  # ═══════════════════════════════════
  # Job 3: Build Docker Image
  # ═══════════════════════════════════
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build \
            --tag aiqa-platform:${{ github.sha }} \
            --tag aiqa-platform:latest \
            --file deploy/Dockerfile \
            .

      - name: Test image starts
        run: |
          docker run -d --name test-container \
            -e SESSION_SECRET=test \
            -e DATABASE_URL=sqlite:///./data/test.db \
            -p 8000:8000 \
            aiqa-platform:latest
          sleep 5
          curl -f http://localhost:8000/health || (docker logs test-container && exit 1)
          docker stop test-container

  # ═══════════════════════════════════
  # Job 4: Push to ECR (main branch only)
  # ═══════════════════════════════════
  push-ecr:
    name: Push to ECR
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build + Push
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          ECR_REPO: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f deploy/Dockerfile -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPO:latest .
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:latest
