<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>{{ title if title else "AI QA Platform" }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="/static/branding/aiqa_logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --accent: #00e5ff; --accent2: #3b82f6; --glow: rgba(0,229,255,0.35);
        --glass: rgba(8,18,42,0.82); --glass-border: rgba(0,229,255,0.18);
        --text: #e8f0ff; --text-muted: rgba(200,215,240,0.55); --danger: #ff5c7a;
        --input-bg: rgba(6,16,40,0.70); --input-text: #d0e0f5;
      }
      html, body { height: 100%; }
      body { font-family: 'Outfit', sans-serif; min-height: 100vh; display: flex; overflow: hidden; position: relative; background: #000; color: var(--text); }

      .page-layout { display: flex; width: 100%; min-height: 100vh; position: relative; z-index: 1; }
      .visual-side { flex: 1; position: relative; overflow: hidden; z-index: 1; }
      .login-side { flex: 0 0 500px; display: flex; align-items: center; justify-content: center; position: relative; z-index: 12; padding: 40px 50px; }

      .bg-base { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 80% 70% at 70% 50%, rgba(0,20,60,0.35), transparent 70%), radial-gradient(ellipse 60% 60% at 20% 60%, rgba(0,50,130,0.08), transparent), #000; }

      .hand-image { position: absolute; inset: 0; z-index: 1; opacity: 0; animation: handReveal 2s 0.3s ease-out forwards; }
      .hand-image img { width: 100%; height: 100%; object-fit: cover; object-position: center 40%; mask-image: linear-gradient(to right, black 50%, transparent 98%); -webkit-mask-image: linear-gradient(to right, black 50%, transparent 98%); }
      @keyframes handReveal { from { opacity: 0; transform: scale(1.04); } to { opacity: 1; transform: scale(1); } }

      .vis-grid { position: absolute; inset: 0; z-index: 2; background-image: linear-gradient(rgba(0,229,255,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,0.015) 1px, transparent 1px); background-size: 50px 50px; mask-image: radial-gradient(ellipse 70% 70% at 40% 50%, rgba(0,0,0,0.4), transparent 80%); animation: gridBr 6s ease-in-out infinite; }
      @keyframes gridBr { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }
      .vis-scanline { position: absolute; inset: 0; z-index: 3; pointer-events: none; background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,229,255,0.003) 3px, rgba(0,229,255,0.003) 6px); }
      .vis-floor { position: absolute; bottom: 0; left: 0; right: 0; height: 35%; z-index: 2; background: repeating-linear-gradient(90deg, rgba(0,229,255,0.02) 0px, rgba(0,229,255,0.02) 1px, transparent 1px, transparent 70px), repeating-linear-gradient(0deg, rgba(0,229,255,0.012) 0px, rgba(0,229,255,0.012) 1px, transparent 1px, transparent 35px); transform: perspective(400px) rotateX(50deg); transform-origin: center bottom; mask-image: linear-gradient(to top, rgba(0,0,0,0.25), transparent 70%); }

      .particles { position: fixed; inset: 0; z-index: 5; pointer-events: none; overflow: hidden; }
      .particle { position: absolute; width: 2px; height: 2px; background: var(--accent); border-radius: 50%; animation: pFloat linear infinite; opacity: 0; }
      @keyframes pFloat { 0% { transform: translateY(100vh); opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.4; } 100% { transform: translateY(-10vh) translateX(25px); opacity: 0; } }

      .beam { position: fixed; height: 1px; z-index: 4; pointer-events: none; width: 100%; animation: bSweep linear infinite; opacity: 0; }
      .beam-1 { top: 30%; background: linear-gradient(90deg, transparent, rgba(0,229,255,0.08) 50%, transparent); animation-duration: 9s; }
      .beam-2 { top: 65%; background: linear-gradient(90deg, transparent, rgba(255,160,50,0.05) 50%, transparent); animation-duration: 13s; animation-delay: -5s; }
      @keyframes bSweep { 0% { transform: translateX(-100%); opacity: 0; } 5% { opacity: 1; } 95% { opacity: 1; } 100% { transform: translateX(100%); opacity: 0; } }

      .vignette { position: fixed; inset: 0; z-index: 6; pointer-events: none; background: radial-gradient(ellipse 80% 75% at 50% 50%, transparent 30%, rgba(0,0,0,0.50) 100%); }

      .login-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(0,50,170,0.18), rgba(0,229,255,0.03) 50%, transparent 70%); filter: blur(50px); pointer-events: none; z-index: 0; animation: lgPulse 5s ease-in-out infinite; }
      @keyframes lgPulse { 0%, 100% { opacity: 0.7; transform: translate(-50%,-50%) scale(1); } 50% { opacity: 1; transform: translate(-50%,-50%) scale(1.05); } }
      .login-side::before { content: ''; position: absolute; left: 0; top: 12%; bottom: 12%; width: 1px; background: linear-gradient(180deg, transparent, rgba(0,229,255,0.12) 30%, rgba(0,229,255,0.12) 70%, transparent); }

      .wrap {
        position: relative; z-index: 10; width: 100%; max-width: 390px; padding: 40px 36px 34px;
        border-radius: 22px; background: var(--glass); border: 1px solid var(--glass-border);
        backdrop-filter: blur(36px) saturate(1.4); -webkit-backdrop-filter: blur(36px) saturate(1.4);
        box-shadow: 0 0 0 1px rgba(0,229,255,0.05), 0 0 40px rgba(0,229,255,0.04), 0 30px 80px rgba(0,0,0,0.50), 0 0 120px rgba(0,80,200,0.05), inset 0 1px 0 rgba(255,255,255,0.06), inset 0 0 60px rgba(0,229,255,0.01);
        overflow: hidden; animation: cardEnter 1s 0.3s cubic-bezier(0.16,1,0.3,1) both;
      }
      @keyframes cardEnter { from { opacity: 0; transform: translateY(28px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
      .wrap::before { content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); animation: lineGlow 3s ease-in-out infinite; }
      @keyframes lineGlow { 0%, 100% { opacity: 0.4; left: 18%; right: 18%; } 50% { opacity: 1; left: 6%; right: 6%; } }
      .wrap::after { content: ''; position: absolute; top: -60%; left: -30%; width: 160%; height: 160%; background: radial-gradient(circle at 50% 0%, rgba(0,229,255,0.05), transparent 55%); pointer-events: none; }

      .corner { position: absolute; width: 18px; height: 18px; }
      .corner::before, .corner::after { content: ''; position: absolute; background: var(--accent); border-radius: 1px; opacity: 0.6; transition: opacity 0.3s; }
      .corner::before { width: 18px; height: 2px; } .corner::after { width: 2px; height: 18px; }
      .corner.tl { top: -1px; left: -1px; }
      .corner.tr { top: -1px; right: -1px; } .corner.tr::before { right: 0; } .corner.tr::after { right: 0; }
      .corner.bl { bottom: -1px; left: -1px; } .corner.bl::before { bottom: 0; } .corner.bl::after { bottom: 0; }
      .corner.br { bottom: -1px; right: -1px; } .corner.br::before { right: 0; bottom: 0; } .corner.br::after { right: 0; bottom: 0; }
      .wrap:hover .corner::before, .wrap:hover .corner::after { opacity: 1; }

      h1 { font-family: 'Outfit', sans-serif; font-size: 23px; font-weight: 800; letter-spacing: -0.3px; background: linear-gradient(135deg, #fff 30%, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-align: center; margin: 0 0 30px; }

      form { display: flex; flex-direction: column; }
      label { display: block; font-size: 11px; font-weight: 600; color: rgba(200,215,240,0.52); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; margin-top: 20px; }
      label:first-of-type { margin-top: 0; }

      input { width: 100%; height: 48px; padding: 0 16px; background: var(--input-bg); border: 1px solid rgba(0,229,255,0.10); border-radius: 12px; color: var(--input-text); font-family: 'Outfit', sans-serif; font-size: 14.5px; outline: none; transition: all 0.3s; margin: 0; -webkit-text-fill-color: var(--input-text); }
      input::placeholder { color: rgba(200,215,240,0.22); font-weight: 300; -webkit-text-fill-color: rgba(200,215,240,0.22); }
      input:focus { border-color: rgba(0,229,255,0.35); background: rgba(6,16,40,0.90); box-shadow: 0 0 0 3px rgba(0,229,255,0.07), 0 0 24px rgba(0,229,255,0.04); }

      input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus, input:-webkit-autofill:active {
        -webkit-box-shadow: 0 0 0 60px rgba(6,16,40,1) inset !important;
        box-shadow: 0 0 0 60px rgba(6,16,40,1) inset !important;
        -webkit-text-fill-color: var(--input-text) !important;
        caret-color: var(--input-text) !important;
        border-color: rgba(0,229,255,0.15) !important;
        transition: background-color 5000s ease-in-out 0s;
      }

      .field { position: relative; } .field input { padding-right: 52px; }
      .toggle-pass { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); width: 34px; height: 34px; border-radius: 9px; border: 1px solid rgba(0,229,255,0.08); background: rgba(6,16,40,0.40); display: grid; place-items: center; cursor: pointer; color: rgba(200,215,240,0.32); padding: 0; transition: all 0.2s; }
      .toggle-pass:hover { border-color: rgba(0,229,255,0.25); color: var(--accent); background: rgba(0,229,255,0.05); }
      .toggle-pass svg { width: 16px; height: 16px; }
      input[type="password"]::-ms-reveal, input[type="password"]::-ms-clear { display: none; }
      input[type="password"]::-webkit-credentials-auto-fill-button { visibility: hidden; display: none !important; pointer-events: none; }

      button[type="submit"] { width: 100%; height: 50px; border: none; border-radius: 12px; font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 0.5px; color: #fff; cursor: pointer; position: relative; overflow: hidden; background: linear-gradient(135deg, var(--accent2), #0068d6); box-shadow: 0 4px 24px rgba(59,130,246,0.32), 0 0 40px rgba(0,229,255,0.04); transition: all 0.3s; margin-top: 26px; padding: 0; }
      button[type="submit"]:hover { transform: translateY(-2px); box-shadow: 0 8px 36px rgba(59,130,246,0.42), 0 0 60px rgba(0,229,255,0.06); }
      button[type="submit"]:active { transform: translateY(0); }
      button[type="submit"]::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.10), transparent); animation: btnShimmer 3.5s ease-in-out infinite; }
      @keyframes btnShimmer { 0% { left: -100%; } 50%, 100% { left: 150%; } }

      .err { margin-top: 14px; padding: 10px 14px; border-radius: 10px; background: rgba(255,92,122,0.08); border: 1px solid rgba(255,92,122,0.18); color: var(--danger); font-size: 13px; }
      .muted { margin-top: 14px; font-size: 13px; color: var(--text-muted); text-align: center; }
      a { color: var(--accent); text-decoration: none; font-weight: 500; transition: 0.2s; }
      a:hover { color: #fff; text-shadow: 0 0 10px var(--glow); }
      .security-badge { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 22px; font-size: 10.5px; color: rgba(200,215,240,0.20); }
      .security-badge svg { width: 12px; height: 12px; opacity: 0.28; }

      @media (max-width: 960px) {
        .page-layout { flex-direction: column; }
        .visual-side { flex: none; height: 35vh; order: 0; }
        .login-side { flex: none; width: 100%; padding: 30px 24px; order: 1; }
        .login-side::before { display: none; }
        .hand-image img { mask-image: linear-gradient(to bottom, black 40%, transparent 95%); -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 95%); object-position: center 35%; }
      }
      @media (max-width: 500px) { .wrap { padding: 28px 22px 24px; } h1 { font-size: 20px; } .visual-side { height: 28vh; } }
    </style>
  </head>

    <div class="beam beam-1"></div>
    <div class="beam beam-2"></div>

    <div class="page-layout">
      <div class="visual-side">
        <div class="hand-image">
          <img src="/static/branding/aiqa_sidebar_logo.png" alt="" loading="eager" />

        <div class="vis-grid"></div>
        <div class="vis-floor"></div>
        <div class="vis-scanline"></div>

      <div class="login-side">

        <div class="wrap">

    </div>

        document.addEventListener("click", function (e) {
          var btn = e.target.closest("[data-toggle='password']");
          if (!btn) return;
          var input = document.getElementById(btn.getAttribute("data-target"));
          if (!input) return;
          var isVis = input.type === "text";
          input.type = isVis ? "password" : "text";
          setIcon(btn, !isVis);

        document.querySelectorAll("[data-toggle='password']").forEach(function(btn) {

          if (input) input.type = "password";
          setIcon(btn, false);
        });
      })();
    </script>
