<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>{{ title if title else "QA Agent" }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
      /* ✅ CRITICAL: stops input/button overflow */
      *, *::before, *::after { box-sizing: border-box; }

      body {
        font-family: system-ui, Arial;
        margin: 0;
        color: #e8eefc;

        background: url("/static/branding/aiqa_hero_login.png") center/cover no-repeat fixed;
        min-height: 100vh;
        position: relative;

        /* ✅ center the card and remove weird scroll */
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px 16px;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at 30% 20%, rgba(0, 40, 120, 0.35), rgba(0, 0, 0, 0.75));
        pointer-events: none;
      }

      .wrap {
        width: min(520px, 92vw);
        padding: 26px;
        border-radius: 18px;
        position: relative;
        overflow: hidden; /* ✅ prevents 1px bleed */

        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);

        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
      }

      h1 { margin: 0 0 14px; font-size: 24px; }

      form {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      label { display:block; margin-top: 6px; opacity:.9; }

      input {
        width: 100%;
        max-width: 100%;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.18);
        background: rgba(10, 14, 25, 0.35);
        color: #e8eefc;
        outline: none;
      }

      input:focus {
        border-color: rgba(120, 170, 255, 0.55);
        box-shadow: 0 0 0 3px rgba(80, 140, 255, 0.15);
      }

      /* ✅ Remove built-in Edge/IE password reveal + clear icons */
      input[type="password"]::-ms-reveal,
      input[type="password"]::-ms-clear {
      display: none;
      }

       /* ✅ Remove Chromium credentials autofill button (key icon) */
       input[type="password"]::-webkit-credentials-auto-fill-button {
       visibility: hidden;
       display: none !important;
       pointer-events: none;
       }

      /* ✅ Only style submit buttons (not the eye icon button) */
      button[type="submit"] {
        width: 100%;
        max-width: 100%;
        padding: 12px;
        margin-top: 8px;
        border-radius: 12px;
        border: 0;
        background: linear-gradient(90deg, #2b6cff, #3a86ff);
        color: white;
        font-weight: 800;
        cursor: pointer;
      }

      .muted { margin-top: 10px; font-size: 14px; opacity: .9; }
      .err { margin-top: 10px; color: #ff7b7b; font-size: 14px; }
      a { color: #9cc3ff; text-decoration: none; }
      a:hover { text-decoration: underline; }

      /* ✅ password field layout */
      .field {
        position: relative;
        width: 100%;
      }

      .field input {
        padding-right: 54px; /* space for eye */
      }

      .toggle-pass {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);

        width: 36px;
        height: 36px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.18);
        background: rgba(10, 14, 25, 0.25);
        display: grid;
        place-items: center;
        cursor: pointer;
        color: #e8eefc;
        padding: 0;
      }

      .toggle-pass:hover {
        border-color: rgba(120, 170, 255, 0.55);
      }

      .toggle-pass svg {
        width: 18px;
        height: 18px;
        opacity: 0.9;
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      {% block content %}{% endblock %}
    </div>

    <script>
      (function () {
        function setIcon(btn, isVisible) {
          btn.innerHTML = isVisible
            ? `<svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                 <path d="M3 3l18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                 <path d="M10.6 10.7a3 3 0 0 0 3.9 3.9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                 <path d="M6.4 6.5C4.5 7.9 3.2 9.7 2.5 12c1.6 5.1 6 8.5 9.5 8.5 1.6 0 3.2-.4 4.6-1.2"
                       stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                 <path d="M9.9 4.1c.7-.2 1.4-.3 2.1-.3 3.5 0 7.9 3.4 9.5 8.5-.5 1.6-1.2 3-2.2 4.2"
                       stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
               </svg>`
            : `<svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                 <path d="M2.5 12C4.1 6.9 8.5 3.5 12 3.5s7.9 3.4 9.5 8.5C19.9 17.1 15.5 20.5 12 20.5S4.1 17.1 2.5 12Z"
                       stroke="currentColor" stroke-width="2" />
                 <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"
                       stroke="currentColor" stroke-width="2" />
               </svg>`;
        }

        document.addEventListener("click", function (e) {
          const btn = e.target.closest("[data-toggle='password']");
          if (!btn) return;

          const targetId = btn.getAttribute("data-target");
          const input = document.getElementById(targetId);
          if (!input) return;

          const isVisible = input.type === "text";
          input.type = isVisible ? "password" : "text";
          setIcon(btn, !isVisible);
          btn.setAttribute("aria-pressed", String(!isVisible));
        });

        // ✅ force masked by default always
        document.querySelectorAll("[data-toggle='password']").forEach((btn) => {
          const targetId = btn.getAttribute("data-target");
          const input = document.getElementById(targetId);
          if (input) input.type = "password";
          setIcon(btn, false);
          btn.setAttribute("aria-pressed", "false");
        });
      })();
    </script>

    <!-- ✅ Cross-tab logout + session invalidation watcher -->
    <script>
      (function () {
        const PUBLIC = ["/login", "/signup", "/forgot-password", "/reset-password"];
        const p = window.location.pathname || "/";
        if (PUBLIC.some(x => p.startsWith(x))) return;

        async function ping() {
          try {
            const r = await fetch("/api/metrics", { credentials: "include" });
            if (r.status === 401 || r.status === 403) {
              window.location.replace("/login");
            }
          } catch (e) {}
        }

        ping();
        setInterval(ping, 4000);
      })();
    </script>
  </body>
</html>
