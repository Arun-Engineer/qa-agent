{% extends "base.html" %}
{% block content %}
  <h1>Reset password</h1>

  {% if error_html %}
    <div class="err">{{ error_html | safe }}</div>
  {% endif %}

  {% if token %}
    <form method="post" action="/reset-password">
      <input type="hidden" name="token" value="{{ token }}" />
      <label>New password</label>
      <div class="field">
        <input id="reset_password" name="password" type="password" placeholder="At least 8 characters" required />
        <button type="button" class="toggle-pass" data-toggle="password" data-target="reset_password" aria-label="Show/hide password"></button>
      </div>
    </form>
  {% endif %}

  <div class="muted">
    Back to <a href="/login">Login</a>
  </div>
{% endblock %}
