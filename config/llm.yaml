# config/llm.yaml — LLM Provider Configuration
# This file sets defaults. Users can override via Admin Panel.

# Which provider to use by default: "openai" or "anthropic"
default_provider: "openai"

providers:
  openai:
    # model: "gpt-4o-mini"          # cost-efficient default
    model: "gpt-4o-mini"
    max_tokens: 4096
    temperature: 0.2
    # api_key: ""                    # prefer OPENAI_API_KEY in .env
    # base_url: ""                   # for Azure OpenAI or proxies

  anthropic:
    model: "claude-sonnet-4-20250514"
    max_tokens: 4096
    temperature: 0.2
    # api_key: ""                    # prefer ANTHROPIC_API_KEY in .env

# Per-agent model overrides (Phase 3 cognitive agents)
agents:
  orchestrator:
    model: null                      # uses default_provider model
    max_tokens: 4096
    temperature: 0.1

  test_strategy:
    model: null
    max_tokens: 4096
    temperature: 0.2

  test_generator:
    model: null
    max_tokens: 8192
    temperature: 0.2

  failure_triage:
    model: null
    max_tokens: 2048
    temperature: 0.1

  self_healer:
    model: null
    max_tokens: 4096
    temperature: 0.1

# Available models for Admin Panel dropdown
available_models:
  openai:
    - "gpt-4o-mini"
    - "gpt-4o"
    - "gpt-4-turbo"
    - "o1-mini"
  anthropic:
    - "claude-sonnet-4-20250514"
    - "claude-haiku-4-5-20251001"
    - "claude-opus-4-20250514"
