# Environment configuration — loaded by src/session/env_registry.py
# Each env defines access rules for the session manager.

environments:
  sit:
    name: SIT
    base_url: "http://localhost:3000"
    api_url: "http://localhost:3000/api"
    access_mode: full
    data_strategy: generate_freely
    approval_required: false
    session_timeout_minutes: 480

  uat:
    name: UAT
    base_url: "http://localhost:3001"
    api_url: "http://localhost:3001/api"
    access_mode: controlled
    data_strategy: seeded_only
    approval_required: false
    session_timeout_minutes: 240

  prod:
    name: PROD
    base_url: "http://localhost:3002"
    api_url: "http://localhost:3002/api"
    access_mode: read_only
    data_strategy: observe_only
    approval_required: true
    session_timeout_minutes: 30
