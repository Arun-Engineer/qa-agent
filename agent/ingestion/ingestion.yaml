# configs/ingestion.yaml
github:
  enabled: true
  repo_url: "https://github.com/your-org/your-repo"
  token_env_var: "GITHUB_TOKEN"
  watch_labels:
    - "bug"
    - "qa-failure"
  poll_interval_minutes: 10

logs:
  enabled: true
  error_log_path: "data/errors.json"
  trigger_on_keywords:
    - "500"
    - "TypeError"
    - "Timeout"
  poll_interval_minutes: 5

slack:
  enabled: true
  slash_command: "/qa-test"
  secret_env_var: "SLACK_SIGNING_SECRET"
  token_env_var: "SLACK_BOT_TOKEN"
  channel_ids:
    - "C01234567"
    - "C07654321"

llm:
  auto_spec: true
  model: "gpt-4"
  provider: "openai"
  api_key_env_var: "OPENAI_API_KEY"
  system_prompt: |
    You are a QA test planner. Given a log or bug message, generate a clean test spec.
