# .github/workflows/test.yml

name: QA Agent Test CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install fpdf rich prometheus_client pytest pytest-json-report

      - name: Run unit tests
        run: pytest tests/unit --json-report --maxfail=1 --disable-warnings -q

      - name: Archive test report
        uses: actions/upload-artifact@v3
        with:
          name: pytest-report
          path: .report.json
