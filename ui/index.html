<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI QA Control Center</title>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>
  <div class="sidebar">
    <h1>AI QA</h1>
    <button onclick="showDashboard()">Dashboard</button>
    <button onclick="showExecutor()">Run Spec</button>
    <button onclick="showAsk()">Ask QA</button>
    <button onclick="loadRuns()">Run History</button>
  </div>

  <div class="main">
    <div id="dashboard">
      <h2>System Analytics</h2>
      <div style="margin-bottom:20px;">
        <span style="color:#22c55e;">●</span> System Online
      </div>

      <div class="cards">
        <div class="card"><p>Total Runs</p><h3 id="totalRuns"></h3></div>
        <div class="card"><p>Pass Rate</p><h3 id="passRate"></h3></div>
        <div class="card"><p>Total Passed</p><h3 id="totalPassed"></h3></div>
        <div class="card"><p>Total Failed</p><h3 id="totalFailed"></h3></div>
      </div>

      <canvas id="metricsChart"></canvas>
    </div>

    <div id="executor" class="hidden">
      <h2>Execute User Story</h2>
      <textarea id="specInput" placeholder="Paste user story..."></textarea>
      <button onclick="runSpec()">Execute</button>
      <div id="executionResult"></div>
    </div>

    <div id="ask" class="hidden">
      <h2>Ask QA Architect</h2>
      <input id="askInput" placeholder="What is functional testing?"/>
      <button onclick="askQA()">Ask</button>
      <div id="askResult"></div>
    </div>

    <div id="runs" class="hidden">
      <h2>Execution History</h2>
      <div id="runsList"></div>
    </div>
  </div>

  <div class="footer-branding">
    AI QA Platform • Powered by FastAPI • AWS Fargate
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
